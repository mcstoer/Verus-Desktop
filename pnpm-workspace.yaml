allowBuilds:
  bufferutil: true
  core-js: false
  core-js-pure: false
  electron: true # downloads the Electron binary on postinstall
  es5-ext: false
  keccak: true
  secp256k1: true
  tiny-secp256k1: true
  utf-8-validate: true
  web3: false
  web3-bzz: false
  web3-shh: false
# Verus libraries have git subdependencies.
blockExoticSubdeps: false
minimumReleaseAge: 10080 # 7 days
# Old resolutions ported over. Possibly can be removed.
overrides:
  async: 2.6.4
  blake2b-wasm: https://github.com/michaeltout/blake2b-wasm
  lodash: 4.17.21
  js-yaml: 3.13.1
  tar: 4.4.18
  https-proxy-agent: 2.2.4
  mem: 4.0.0
  bin-links: 1.1.6
  yargs-parser: 21.1.1
  minimist: 1.2.6
  decode-uri-component: 0.2.1
  elliptic: 6.6.1
  ejs: 3.1.7
  bn.js: 4.11.8
  dot-prop: 5.2.0
  npm-registry-fetch: 4.0.5
  http-cache-semantics: 4.1.1
  ini: 1.3.8
  ssri: 8.0.1
  y18n: 5.0.5
  hosted-git-info: 3.0.8
  ajv: 6.12.3
  ws: 7.4.6
  normalize-url: 4.5.1
  path-parse: 1.0.7
  ansi-regex: 5.0.1
  qs: 6.2.4
  debug: 2.6.9
  follow-redirects: 1.15.4
  fresh: 0.5.2
  mime: 1.4.1
  minimatch: 5.1.0
  json-schema: 0.4.0
  got: 11.8.5
  json5: 2.2.2
  semver: 6.3.1
  tough-cookie: 4.1.3
  secp256k1: 3.8.1
  pbkdf2: 3.1.3
  body-parser: 1.20.3
  tiny-secp256k1: 1.1.7
  form-data: 4.0.4
  base-x: 3.0.11
  ip: 1.1.9
# The Verus bitcoin-ops fork omits evals.json from its `files` allowlist, so
# pnpm's npm-pack of the git dep drops it. @bitgo/utxo-lib requires it at load
# (optccparams.js), so we restore it via patch.
patchedDependencies:
  'bitcoin-ops@1.4.1': patches/bitcoin-ops.patch
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 10080 # 7 days
