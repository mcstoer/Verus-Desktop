allowBuilds:
  bufferutil: true
  core-js: false
  core-js-pure: false
  electron: true # downloads the Electron binary on postinstall
  es5-ext: false
  keccak: true
  secp256k1: true
  tiny-secp256k1: true
  utf-8-validate: true
  web3: false
  web3-bzz: false
  web3-shh: false
# Verus libraries have git subdependencies.
blockExoticSubdeps: false
minimumReleaseAge: 10080 # 7 days
# Resolutions ported over from yarn. Some have been updated to newer safe versions since they
# were pinned to now unsafe ones.
overrides:
  ajv: 6.15.0
  ansi-regex: 5.0.1
  async: 2.6.4
  base-x: 3.0.11
  blake2b-wasm: https://github.com/michaeltout/blake2b-wasm#a16070b30bb8d8aee670f0c69b642913eca79998 # Must have override.
  bn.js: 4.12.3
  body-parser: 1.20.3
  debug: 2.6.9
  decode-uri-component: 0.2.1
  ejs: 3.1.7
  elliptic: 6.6.1
  form-data: 4.0.4
  got: 11.8.5
  hosted-git-info: 3.0.8
  http-cache-semantics: 4.1.1
  https-proxy-agent: 2.2.4
  ini: 1.3.8
  js-yaml: 3.13.1
  json5: 2.2.2
  lodash: 4.18.1
  mime: 1.4.1
  minimatch: 5.1.9
  minimist: 1.2.6
  normalize-url: 4.5.1
  pbkdf2: 3.1.3
  qs: 6.15.2
  secp256k1: 3.8.1
  semver: 6.3.1
  tar: 4.4.18
  tough-cookie: 4.1.3
  ws: 7.5.11
  y18n: 5.0.5
  yargs-parser: 21.1.1
# The Verus bitcoin-ops fork omits evals.json from its `files` allowlist, so
# pnpm's npm-pack of the git dep drops it. @bitgo/utxo-lib requires it at load
# (optccparams.js), so we restore it via patch.
patchedDependencies:
  'bitcoin-ops@1.4.1': patches/bitcoin-ops.patch
trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 10080 # 7 days
